name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GnuPG
        run: sudo apt-get update && sudo apt-get install -y gnupg

      - name: Build linux binary
        run: bash scripts/build_linux.sh

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            dist/canvassr-decryption-manager
            dist/SHA256SUMS

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build windows executable
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/canvassr-decryption-manager.exe
            dist/SHA256SUMS

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release/linux

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/windows

      - name: Rename checksum files
        run: |
          mv release/linux/SHA256SUMS release/linux/SHA256SUMS-linux
          mv release/windows/SHA256SUMS release/windows/SHA256SUMS-windows

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/linux/canvassr-decryption-manager
            release/linux/SHA256SUMS-linux
            release/windows/canvassr-decryption-manager.exe
            release/windows/SHA256SUMS-windows
          draft: false
          prerelease: false
