name: Build and Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q

  package-linux:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GnuPG
        run: sudo apt-get update && sudo apt-get install -y gnupg

      - name: Build linux binary
        run: bash scripts/build_linux.sh

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: |
            dist/canvassr-decryption-manager
            dist/SHA256SUMS

  package-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build windows executable
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            dist/canvassr-decryption-manager.exe
            dist/SHA256SUMS
